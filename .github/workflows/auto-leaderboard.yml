name: Auto-Leaderboard

# Validate community leaderboard submissions and open a follow-up PR that
# updates data/leaderboard.json. We use pull_request_target so the workflow
# can write back, but we **only** check out the base ref — never the PR
# author's code — and the only PR-supplied input that ever leaves the
# sandbox is the submission YAML, which is parsed against a strict schema.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled]
    paths:
      - "submissions/**.yaml"
      - "submissions/**.yml"

permissions:
  # contents: write is required so peter-evans/create-pull-request can
  # push the auto-leaderboard/pr-N branch back to the repo. The base
  # ref checkout still uses persist-credentials: false to avoid the
  # duplicate-Authorization-header issue against the create-PR action.
  contents: write
  pull-requests: write

jobs:
  validate-submission:
    if: contains(github.event.pull_request.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base ref (never PR head)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          # peter-evans/create-pull-request can't compose with the
          # Authorization header that actions/checkout persists by
          # default — git emits "Duplicate header: Authorization" and
          # fails with HTTP 400. Disable credential persistence here;
          # the create-PR action passes its own token in step env.
          persist-credentials: false

      - name: Fetch only the submission YAMLs from the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          mkdir -p _pr_submissions
          # Pull the list of changed files in the PR. Only accept paths
          # under submissions/ that end in .yaml or .yml.
          gh pr diff "$PR_NUMBER" --name-only \
            | grep -E '^submissions/.+\.(ya?ml)$' \
            | while read -r path; do
                gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid > /tmp/sha
                sha=$(cat /tmp/sha)
                mkdir -p "_pr_submissions/$(dirname "$path")"
                gh api "repos/${{ github.repository }}/contents/${path}?ref=${sha}" \
                  --jq '.content' | base64 -d > "_pr_submissions/${path}"
              done
          echo "Fetched submissions:"
          find _pr_submissions -type f

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator (no model code, no PR code executes)
        run: |
          python -m pip install --upgrade pip
          pip install ".[models]" pyyaml

      - name: Validate each submission against BenchmarkResult schema
        id: validate
        run: |
          python <<'PY'
          import json
          import sys
          from pathlib import Path

          import yaml
          from openlithohub.leaderboard.schema import BenchmarkResult

          subs = sorted(Path("_pr_submissions/submissions").rglob("*.y*ml"))
          if not subs:
              print("::error::No submission files found under submissions/.")
              sys.exit(1)

          out = []
          for p in subs:
              data = yaml.safe_load(p.read_text())
              try:
                  result = BenchmarkResult.model_validate(data)
              except Exception as e:
                  print(f"::error file={p}::Schema validation failed: {e}")
                  sys.exit(1)
              out.append((str(p), result.model_dump(mode="json")))
              print(f"OK: {p} → {result.model_name} ({result.dataset}, {result.process_node.value})")

          Path("_validated.json").write_text(json.dumps(out, indent=2, default=str))
          PY

      - name: Append validated entries to leaderboard store
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          from openlithohub.leaderboard.schema import BenchmarkResult
          from openlithohub.leaderboard.tracker import LeaderboardStore, submit_result

          # Canonical store lives at leaderboard/leaderboard.json
          # (data/ is gitignored, so the follow-up PR cannot stage a
          # file written there).
          store_path = Path("leaderboard/leaderboard.json")
          store_path.parent.mkdir(parents=True, exist_ok=True)
          store = LeaderboardStore(store_path)

          for path, payload in json.loads(Path("_validated.json").read_text()):
              result = BenchmarkResult.model_validate(payload)
              sid = submit_result(result, store=store)
              print(f"  inserted {sid} ← {path}")
          PY

      - name: Open follow-up PR with updated leaderboard
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            leaderboard/leaderboard.json
          branch: auto-leaderboard/pr-${{ github.event.pull_request.number }}
          base: ${{ github.event.pull_request.base.ref }}
          commit-message: |
            chore(leaderboard): merge submission from PR #${{ github.event.pull_request.number }}
          title: "Leaderboard update from #${{ github.event.pull_request.number }}"
          body: |
            Auto-generated from #${{ github.event.pull_request.number }}.

            The submission YAML(s) in that PR were validated against
            `BenchmarkResult` and appended to `leaderboard/leaderboard.json`.

            See `docs/leaderboard-submission.md` for the submission policy.

      - name: Comment on the originating PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Submission YAML validated. Follow-up PR updating `leaderboard/leaderboard.json` has been opened — once that lands, this submission will appear on the leaderboard.'
            })
