name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 6 * * 1"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install linting tools
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/ spaces/ scripts/ klayout/ notebooks/
      - name: Ruff format check
        run: ruff format --check src/ tests/ spaces/ scripts/ klayout/ notebooks/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --cov=openlithohub --cov-report=xml -v
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package + security tools
        run: |
          pip install .
          pip install pip-audit bandit
      - name: pip-audit (installed environment)
        run: pip-audit
      - name: Bandit (gate on high severity)
        run: bandit -r src/ -lll
      - name: Bandit (gate on medium severity)
        run: bandit -r src/ -ll
