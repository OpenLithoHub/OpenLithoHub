name: Docker

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/docker.yml"
      - "pyproject.toml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build (and push on tag)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: ${{ github.event_name != 'push' }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Resolve smoke-test image tag
        id: smoketag
        run: |
          tag="$(echo "${{ steps.meta.outputs.tags }}" | head -n1)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Smoke test — CLI entrypoint
        run: docker run --rm "${{ steps.smoketag.outputs.tag }}" --version

      - name: Smoke test — KLayout + openlithohub import
        run: |
          docker run --rm --entrypoint python "${{ steps.smoketag.outputs.tag }}" \
            -c "import klayout.db; import openlithohub; print('ok')"

      - name: Report final image size
        run: |
          size_bytes=$(docker image inspect "${{ steps.smoketag.outputs.tag }}" --format '{{.Size}}')
          size_mb=$(awk -v b="$size_bytes" 'BEGIN { printf "%.1f", b/1024/1024 }')
          {
            echo "### Docker image"
            echo ""
            echo "- Tag: \`${{ steps.smoketag.outputs.tag }}\`"
            echo "- Size: **${size_mb} MB**"
          } >> "$GITHUB_STEP_SUMMARY"
