# Sample submission template — duplicate, rename, fill in.
model_name: example-model
dataset: lithobench
process_node: 7nm
mask_topology: curvilinear

# Mask-level EPE — sanity baseline only (an Identity model trivially scores 0).
epe_mean_nm: 0.0
epe_max_nm: 0.0

# REQUIRED: wafer-level L2 error from forward simulation. The leaderboard
# rejects submissions without this field — see schema.py
# `_require_forward_simulation`. Run the model through
# `openlithohub.simulators` (Hopkins backend is bundled) and report the
# Neural-ILT printability scalar.
l2_error_pixels: 0.0

# Optional but strongly recommended — forward-sim outputs that round out
# the headline ranking (PV band) and diagnostics (wafer-level EPE).
# pvband_mean_nm: 0.0
# pvband_max_nm: 0.0
# epe_wafer_mean_nm: 0.0
# epe_wafer_max_nm: 0.0
# l2_error_nm2: 0.0
# mrc_violation_rate: 0.0
# drc_pass: true
# shot_count: 0
# stochastic_robustness: 0.0

paper_url: https://example.com/paper
code_url: https://github.com/example/model
notes: |
  Replace with your model details. See docs/leaderboard-submission.md.
